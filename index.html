<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360° Panorama Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7);
    color: #fff; font-family: system-ui, sans-serif;
    cursor: pointer; user-select: none;
    z-index: 10;
  }
  #overlay h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); margin-bottom: .5rem; letter-spacing: .05em; }
  #overlay p  { font-size: clamp(.9rem, 2.5vw, 1.1rem); opacity: .75; }
  #overlay .icon { font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 1rem; }
  #overlay.hidden { display: none; }
  #hint {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.55); font-family: system-ui, sans-serif;
    font-size: .8rem; pointer-events: none; letter-spacing: .04em;
    transition: opacity .4s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div class="icon">🌐</div>
  <h1>360° Panorama</h1>
  <p>Click anywhere to look around</p>
</div>
<div id="hint">ESC to release mouse · drag to look</div>

<video id="v" src="myVideo.mp4" loop playsinline crossorigin="anonymous"
       style="display:none"></video>

<script>
// ── WebGL 360° equirectangular panorama viewer ─────────────────────────────
const canvas  = document.getElementById('c');
const overlay = document.getElementById('overlay');
const hint    = document.getElementById('hint');
const video   = document.getElementById('v');
const gl      = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

if (!gl) { overlay.innerHTML = '<p>WebGL not supported in this browser.</p>'; }

// ── Shaders ────────────────────────────────────────────────────────────────
const VS = `
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uMVP;
varying vec2 vUV;
void main(){
  gl_Position = uMVP * vec4(aPos, 1.0);
  vUV = aUV;
}`;

const FS = `
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
void main(){
  gl_FragColor = texture2D(uTex, vUV);
}`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const aPos = gl.getAttribLocation(prog, 'aPos');
const aUV  = gl.getAttribLocation(prog, 'aUV');
const uMVP = gl.getUniformLocation(prog, 'uMVP');
const uTex = gl.getUniformLocation(prog, 'uTex');

// ── Sphere geometry (inverted — camera inside) ─────────────────────────────
function buildSphere(latBands, lonBands) {
  const verts = [], uvs = [], indices = [];
  for (let lat = 0; lat <= latBands; lat++) {
    const theta = lat * Math.PI / latBands;        // 0 … π
    const sinT  = Math.sin(theta), cosT = Math.cos(theta);
    for (let lon = 0; lon <= lonBands; lon++) {
      const phi  = lon * 2 * Math.PI / lonBands;  // 0 … 2π
      const x    = sinT * Math.cos(phi);
      const y    = cosT;
      const z    = sinT * Math.sin(phi);
      verts.push(x, y, z);
      // UV: equirectangular — u = lon/lonBands, v = lat/latBands
      // flip u so the image isn't mirrored (inside sphere)
      uvs.push(1 - lon / lonBands, lat / latBands);
    }
  }
  for (let lat = 0; lat < latBands; lat++) {
    for (let lon = 0; lon < lonBands; lon++) {
      const a = lat * (lonBands + 1) + lon;
      const b = a + lonBands + 1;
      // winding order reversed for inside-sphere
      indices.push(a, a + 1, b, b, a + 1, b + 1);
    }
  }
  return { verts: new Float32Array(verts), uvs: new Float32Array(uvs),
           indices: new Uint16Array(indices) };
}

const sphere = buildSphere(64, 128);

const vBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vBuf);
gl.bufferData(gl.ARRAY_BUFFER, sphere.verts, gl.STATIC_DRAW);

const uvBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
gl.bufferData(gl.ARRAY_BUFFER, sphere.uvs, gl.STATIC_DRAW);

const iBuf = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, iBuf);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, sphere.indices, gl.STATIC_DRAW);

// ── Texture ────────────────────────────────────────────────────────────────
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
// placeholder 1×1 pixel while video loads
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
              new Uint8Array([0, 0, 0, 255]));
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

let videoReady = false;
video.addEventListener('canplaythrough', () => { videoReady = true; });
video.addEventListener('error', (e) => {
  console.warn('Video error:', e);
  hint.textContent = 'Video failed to load — check the src path.';
});

// ── Camera state ───────────────────────────────────────────────────────────
let yaw = 0, pitch = 0;
const PITCH_MAX = Math.PI / 2 - 0.05;
let pointerLocked = false;
let lastX = 0, lastY = 0, dragging = false;
const SENSITIVITY_PL = 0.002;   // pointer-lock sensitivity (rad/px)
const SENSITIVITY_DR = 0.004;   // drag sensitivity

// Pointer Lock
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', (e) => {
  if (pointerLocked) {
    yaw   -= e.movementX * SENSITIVITY_PL;
    pitch -= e.movementY * SENSITIVITY_PL;
    pitch  = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, pitch));
  } else if (dragging) {
    yaw   -= e.movementX * SENSITIVITY_DR;
    pitch -= e.movementY * SENSITIVITY_DR;
    pitch  = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, pitch));
  }
});
canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
document.addEventListener('mouseup',  () => { dragging = false; });

// Touch support
let lastTouchX = 0, lastTouchY = 0;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  dragging = true;
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragging) return;
  const dx = e.touches[0].clientX - lastTouchX;
  const dy = e.touches[0].clientY - lastTouchY;
  yaw   -= dx * SENSITIVITY_DR;
  pitch -= dy * SENSITIVITY_DR;
  pitch  = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, pitch));
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// ── Start on click ─────────────────────────────────────────────────────────
overlay.addEventListener('click', () => {
  overlay.classList.add('hidden');
  video.play().catch(() => {});
  canvas.requestPointerLock && canvas.requestPointerLock();
});

// ── Math helpers ───────────────────────────────────────────────────────────
function mat4() { return new Float32Array(16); }
function perspective(fovY, aspect, near, far) {
  const m = mat4(), f = 1 / Math.tan(fovY / 2);
  m[0]  = f / aspect; m[5]  = f;
  m[10] = (far + near) / (near - far);
  m[11] = -1;
  m[14] = 2 * far * near / (near - far);
  return m;
}
function rotY(a) {
  const c = Math.cos(a), s = Math.sin(a), m = mat4();
  m[0]=c; m[2]=s; m[5]=1; m[8]=-s; m[10]=c; m[15]=1;
  return m;
}
function rotX(a) {
  const c = Math.cos(a), s = Math.sin(a), m = mat4();
  m[0]=1; m[5]=c; m[6]=-s; m[9]=s; m[10]=c; m[15]=1;
  return m;
}
function mul(a, b) {
  const m = mat4();
  for (let r = 0; r < 4; r++)
    for (let c2 = 0; c2 < 4; c2++)
      for (let k = 0; k < 4; k++)
        m[r + c2*4] += a[r + k*4] * b[k + c2*4];
  return m;
}

// ── Resize ────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── Render loop ────────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);

  // Upload video frame to texture
  if (videoReady && !video.paused && !video.ended && video.readyState >= 2) {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
  }

  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const aspect = canvas.width / canvas.height;
  const proj   = perspective(Math.PI / 2.5, aspect, 0.1, 100);
  const view   = mul(rotX(pitch), rotY(yaw));
  const mvp    = mul(proj, view);

  gl.uniformMatrix4fv(uMVP, false, mvp);
  gl.uniform1i(uTex, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, vBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, iBuf);
  gl.drawElements(gl.TRIANGLES, sphere.indices.length, gl.UNSIGNED_SHORT, 0);
}
render();
</script>
</body>
</html>
